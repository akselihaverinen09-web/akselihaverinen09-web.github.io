<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally Sprint 3D - Akseli Haverinen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sky: #87ceeb;
            --ground: #8b9467;
            --track: #343b3f;
            --track-edge: #5f666b;
            --accent: #ff6b35;
            --panel: #1f2629;
            --text: #f7f9fa;
        }

        body {
            min-height: 100vh;
            font-family: 'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f4ff 100%);
            color: var(--text);
            overflow: hidden;
        }

        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #f4f4f4;
            background: #1f2629cc;
            border-radius: 999px;
            padding: 10px 16px;
            border: 1px solid #ffffff30;
            font-weight: 600;
            transition: transform 0.2s ease, background 0.2s ease;
            z-index: 100;
        }

        .back-link:hover {
            transform: translateX(-2px);
            background: #1f2629;
        }

        #game {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .hud-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .pill {
            background: #1f2629dd;
            border: 1px solid #ffffff26;
            border-radius: 999px;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 1rem;
            color: #f7f9fa;
            text-align: right;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: 700;
            cursor: pointer;
            color: #101517;
            background: #f8d66d;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #fae087;
            transform: translateY(-2px);
        }

        button.secondary {
            background: #e5ecf0;
        }

        button.secondary:hover {
            background: #f0f5f8;
        }

        .finish-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #111827d8;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 200;
        }

        .finish-overlay.show {
            display: flex;
        }

        .finish-overlay h2 {
            font-size: 3rem;
            color: #f8fafc;
        }

        .finish-overlay p {
            font-size: 1.5rem;
            color: #e7ecef;
        }

        .touch {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            z-index: 100;
        }

        .touch button {
            min-width: 80px;
            min-height: 50px;
            background: #ffffffd1;
            pointer-events: all;
        }

        @media (max-width: 860px) {
            .touch {
                display: grid;
            }

            .hud-overlay {
                font-size: 0.85rem;
            }

            .pill {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <a class="back-link" href="projektit.html">← Takaisin projekteihin</a>

    <div class="hud-overlay">
        <div class="pill">Lap: <strong id="lap">1</strong>/3</div>
        <div class="pill">Aika: <strong id="time">0.00</strong>s</div>
        <div class="pill">Paras: <strong id="best">--</strong></div>
        <div class="pill">Nopeus: <strong id="speed">0</strong> km/h</div>
    </div>

    <canvas id="game"></canvas>

    <div class="controls">
        <button id="restartBtn" type="button">Aloita alusta</button>
        <button id="cameraBtn" class="secondary" type="button">Vaihda kameraa</button>
    </div>

    <div class="touch" aria-label="Touch controls">
        <button data-key="up" type="button">GAS</button>
        <button data-key="down" type="button">BRAKE</button>
        <button data-key="left" type="button">LEFT</button>
        <button data-key="right" type="button">RIGHT</button>
    </div>

    <div class="finish-overlay" id="finishOverlay">
        <h2>Maali!</h2>
        <p>Aika: <strong id="finishTime">0.00s</strong></p>
        <button id="finishRestartBtn" type="button">Aloita alusta</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // DOM elements
        const canvas = document.getElementById('game');
        const lapEl = document.getElementById('lap');
        const timeEl = document.getElementById('time');
        const bestEl = document.getElementById('best');
        const speedEl = document.getElementById('speed');
        const finishOverlay = document.getElementById('finishOverlay');
        const finishTimeEl = document.getElementById('finishTime');

        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 100, 300);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff5e6, 0.8);
        sunLight.position.set(50, 80, 30);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.left = -150;
        sunLight.shadow.camera.right = 150;
        sunLight.shadow.camera.top = 150;
        sunLight.shadow.camera.bottom = -150;
        scene.add(sunLight);

        // Ground
        const groundGeometry = new THREE.PlaneGeometry(400, 400);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x7a8f5a,
            roughness: 0.8
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Create 3D track (oval racing circuit)
        function createTrack() {
            const trackGroup = new THREE.Group();
            
            // Track parameters (oval shape)
            const outerRadiusX = 80;
            const outerRadiusZ = 50;
            const innerRadiusX = 60;
            const innerRadiusZ = 30;
            const trackHeight = 0.5;
            const segments = 64;

            // Create track surface
            const trackShape = new THREE.Shape();
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const x = Math.cos(angle) * outerRadiusX;
                const z = Math.sin(angle) * outerRadiusZ;
                if (i === 0) trackShape.moveTo(x, z);
                else trackShape.lineTo(x, z);
            }

            const innerHole = new THREE.Path();
            for (let i = segments; i >= 0; i--) {
                const angle = (i / segments) * Math.PI * 2;
                const x = Math.cos(angle) * innerRadiusX;
                const z = Math.sin(angle) * innerRadiusZ;
                if (i === segments) innerHole.moveTo(x, z);
                else innerHole.lineTo(x, z);
            }
            trackShape.holes.push(innerHole);

            const trackGeometry = new THREE.ExtrudeGeometry(trackShape, {
                depth: trackHeight,
                bevelEnabled: false
            });
            trackGeometry.rotateX(-Math.PI / 2);

            const trackMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2a2e31,
                roughness: 0.9,
                metalness: 0.1
            });
            const track = new THREE.Mesh(trackGeometry, trackMaterial);
            track.receiveShadow = true;
            track.castShadow = false;
            trackGroup.add(track);

            // Add curbs (outer)
            for (let i = 0; i < segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const x = Math.cos(angle) * (outerRadiusX + 1);
                const z = Math.sin(angle) * (outerRadiusZ + 1);
                
                const curbGeometry = new THREE.BoxGeometry(1.5, 0.3, 1.5);
                const curbMaterial = new THREE.MeshStandardMaterial({
                    color: i % 2 === 0 ? 0xff0000 : 0xffffff
                });
                const curb = new THREE.Mesh(curbGeometry, curbMaterial);
                curb.position.set(x, trackHeight + 0.15, z);
                curb.castShadow = true;
                curb.receiveShadow = true;
                trackGroup.add(curb);
            }

            // Add curbs (inner)
            for (let i = 0; i < segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const x = Math.cos(angle) * (innerRadiusX - 1);
                const z = Math.sin(angle) * (innerRadiusZ - 1);
                
                const curbGeometry = new THREE.BoxGeometry(1.5, 0.3, 1.5);
                const curbMaterial = new THREE.MeshStandardMaterial({
                    color: i % 2 === 0 ? 0xff0000 : 0xffffff
                });
                const curb = new THREE.Mesh(curbGeometry, curbMaterial);
                curb.position.set(x, trackHeight + 0.15, z);
                curb.castShadow = true;
                curb.receiveShadow = true;
                trackGroup.add(curb);
            }

            // Start/finish line
            for (let i = 0; i < 8; i++) {
                const lineGeometry = new THREE.BoxGeometry(1, 0.05, 2);
                const lineMaterial = new THREE.MeshStandardMaterial({
                    color: i % 2 === 0 ? 0xffffff : 0x000000
                });
                const line = new THREE.Mesh(lineGeometry, lineMaterial);
                line.position.set(-4 + i * 1, trackHeight + 0.03, outerRadiusZ - 5);
                trackGroup.add(line);
            }

            return trackGroup;
        }

        // Create 3D car
        function createCar() {
            const carGroup = new THREE.Group();

            // Car body
            const bodyGeometry = new THREE.BoxGeometry(2, 0.8, 4);
            const bodyMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff6b35,
                metalness: 0.6,
                roughness: 0.4
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 1;
            body.castShadow = true;
            carGroup.add(body);

            // Roof/cabin
            const roofGeometry = new THREE.BoxGeometry(1.6, 0.6, 2);
            const roofMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1f2937,
                metalness: 0.5,
                roughness: 0.5
            });
            const roof = new THREE.Mesh(roofGeometry, roofMaterial);
            roof.position.y = 1.7;
            roof.position.z = -0.3;
            roof.castShadow = true;
            carGroup.add(roof);

            // Windows
            const windowGeometry = new THREE.BoxGeometry(1.5, 0.5, 1);
            const windowMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x6dd5fa,
                metalness: 0.9,
                roughness: 0.1,
                transparent: true,
                opacity: 0.6
            });
            const frontWindow = new THREE.Mesh(windowGeometry, windowMaterial);
            frontWindow.position.set(0, 1.7, 0.6);
            carGroup.add(frontWindow);

            // Wheels
            const wheelGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
            const wheelMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a1a,
                roughness: 0.8
            });

            const wheels = [
                { x: -0.9, z: 1.4 },
                { x: 0.9, z: 1.4 },
                { x: -0.9, z: -1.4 },
                { x: 0.9, z: -1.4 }
            ];

            wheels.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos.x, 0.4, pos.z);
                wheel.castShadow = true;
                carGroup.add(wheel);
            });

            return carGroup;
        }

        // Add trees and scenery
        function addScenery() {
            const treePositions = [
                { x: 100, z: 0 }, { x: -100, z: 0 }, { x: 0, z: 80 }, { x: 0, z: -80 },
                { x: 70, z: 60 }, { x: -70, z: 60 }, { x: 70, z: -60 }, { x: -70, z: -60 },
                { x: 90, z: 30 }, { x: -90, z: 30 }, { x: 90, z: -30 }, { x: -90, z: -30 }
            ];

            treePositions.forEach(pos => {
                // Tree trunk
                const trunkGeometry = new THREE.CylinderGeometry(0.5, 0.7, 4, 8);
                const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x654321 });
                const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
                trunk.position.set(pos.x, 2, pos.z);
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                scene.add(trunk);

                // Tree foliage
                const foliageGeometry = new THREE.ConeGeometry(3, 6, 8);
                const foliageMaterial = new THREE.MeshStandardMaterial({ color: 0x2d5016 });
                const foliage = new THREE.Mesh(foliageGeometry, foliageMaterial);
                foliage.position.set(pos.x, 6, pos.z);
                foliage.castShadow = true;
                foliage.receiveShadow = true;
                scene.add(foliage);
            });
        }

        // Initialize scene
        const trackMesh = createTrack();
        scene.add(trackMesh);

        const carMesh = createCar();
        scene.add(carMesh);

        addScenery();

        // Game state
        const world = {
            lapsTarget: 3,
            lap: 1,
            started: false,
            finished: false,
            elapsed: 0,
            checkpointHit: [false, false, false, false],
            best: Number(localStorage.getItem('rally-best-time-3d') || 0)
        };

        const car = {
            x: 0,
            z: 45,
            y: 0.5,
            angle: Math.PI,
            speed: 0,
            velocity: new THREE.Vector3(),
            maxSpeed: 35,
            accel: 0.8,
            brake: 1.2,
            drag: 0.98,
            turnRate: 0.025,
            driftAngle: 0
        };

        const keys = { up: false, down: false, left: false, right: false };
        let cameraMode = 0; // 0 = follow, 1 = far, 2 = first person

        // Track boundary check (oval)
        function isOnTrack(x, z) {
            const outerRadiusX = 80;
            const outerRadiusZ = 50;
            const innerRadiusX = 60;
            const innerRadiusZ = 30;

            const outer = (x * x) / (outerRadiusX * outerRadiusX) + (z * z) / (outerRadiusZ * outerRadiusZ) <= 1;
            const inner = (x * x) / (innerRadiusX * innerRadiusX) + (z * z) / (innerRadiusZ * innerRadiusZ) < 1;
            return outer && !inner;
        }

        // Update checkpoints
        function updateCheckpoints() {
            if (car.x > 10 && Math.abs(car.z) < 20) {
                world.checkpointHit[0] = true;
            }
            if (car.z < -10 && Math.abs(car.x) < 30) {
                world.checkpointHit[1] = true;
            }
            if (car.x < -10 && Math.abs(car.z) < 20) {
                world.checkpointHit[2] = true;
            }
            if (car.z > 10 && Math.abs(car.x) < 30) {
                world.checkpointHit[3] = true;
            }

            const onStart = Math.abs(car.z - 45) < 5 && Math.abs(car.x) < 8;
            const fullLoop = world.checkpointHit.every(Boolean);
            if (onStart && fullLoop && world.started) {
                world.lap += 1;
                world.checkpointHit = [false, false, false, false];
                lapEl.textContent = String(Math.min(world.lap, world.lapsTarget));

                if (world.lap > world.lapsTarget) {
                    world.finished = true;
                    finishTimeEl.textContent = world.elapsed.toFixed(2) + 's';
                    finishOverlay.classList.add('show');
                    
                    if (world.best === 0 || world.elapsed < world.best) {
                        world.best = world.elapsed;
                        localStorage.setItem('rally-best-time-3d', String(world.best));
                        updateBest();
                    }
                }
            }
        }

        // Update car physics
        function updateCar(dt) {
            if (keys.up) {
                car.speed += car.accel * dt * 60;
                world.started = true;
            }
            if (keys.down) {
                car.speed -= car.brake * dt * 60;
            }

            car.speed *= Math.pow(car.drag, dt * 60);
            if (car.speed > car.maxSpeed) car.speed = car.maxSpeed;
            if (car.speed < -10) car.speed = -10;

            const steerPower = Math.min(Math.abs(car.speed) / car.maxSpeed, 1);
            if (keys.left) car.angle += car.turnRate * (0.4 + steerPower * 0.8) * dt * 60;
            if (keys.right) car.angle -= car.turnRate * (0.4 + steerPower * 0.8) * dt * 60;

            const nextX = car.x + Math.sin(car.angle) * car.speed * dt;
            const nextZ = car.z + Math.cos(car.angle) * car.speed * dt;

            const onTrack = isOnTrack(nextX, nextZ);
            if (!onTrack) {
                car.speed *= 0.85;
            }

            car.x = nextX;
            car.z = nextZ;

            // Update car mesh
            carMesh.position.x = car.x;
            carMesh.position.y = car.y;
            carMesh.position.z = car.z;
            carMesh.rotation.y = -car.angle;

            // Add slight tilt when turning
            const tiltAmount = (keys.left ? -0.08 : keys.right ? 0.08 : 0) * steerPower;
            carMesh.rotation.z = tiltAmount;
        }

        // Update camera
        function updateCamera() {
            if (cameraMode === 0) {
                // Follow camera (behind car)
                const camDistance = 18;
                const camHeight = 8;
                const camX = car.x - Math.sin(car.angle) * camDistance;
                const camZ = car.z - Math.cos(car.angle) * camDistance;
                
                camera.position.x += (camX - camera.position.x) * 0.1;
                camera.position.y += (car.y + camHeight - camera.position.y) * 0.1;
                camera.position.z += (camZ - camera.position.z) * 0.1;
                
                camera.lookAt(car.x, car.y + 1, car.z);
            } else if (cameraMode === 1) {
                // Far view
                camera.position.x = 0;
                camera.position.y = 100;
                camera.position.z = 0;
                camera.lookAt(car.x, car.y, car.z);
            } else {
                // First person view
                const camDistance = 3;
                const camHeight = 2;
                const camX = car.x + Math.sin(car.angle) * camDistance;
                const camZ = car.z + Math.cos(car.angle) * camDistance;
                
                camera.position.x = camX;
                camera.position.y = car.y + camHeight;
                camera.position.z = camZ;
                
                const lookX = car.x + Math.sin(car.angle) * 20;
                const lookZ = car.z + Math.cos(car.angle) * 20;
                camera.lookAt(lookX, car.y + 1, lookZ);
            }
        }

        // Format time
        function formatTime(value) {
            return value.toFixed(2) + 's';
        }

        function updateBest() {
            if (world.best > 0) {
                bestEl.textContent = formatTime(world.best);
            } else {
                bestEl.textContent = '--';
            }
        }

        // Reset race
        function resetRace() {
            world.lap = 1;
            world.started = false;
            world.finished = false;
            world.elapsed = 0;
            world.checkpointHit = [false, false, false, false];

            car.x = 0;
            car.z = 45;
            car.angle = Math.PI;
            car.speed = 0;

            lapEl.textContent = String(world.lap);
            timeEl.textContent = '0.00';
            speedEl.textContent = '0';
            
            finishOverlay.classList.remove('show');
        }

        // Game loop
        let lastTs = performance.now();
        function gameLoop(ts) {
            const dt = Math.min((ts - lastTs) / 1000, 0.05);
            lastTs = ts;

            if (!world.finished) {
                updateCar(dt);
                updateCheckpoints();

                if (world.started) {
                    world.elapsed += dt;
                    timeEl.textContent = world.elapsed.toFixed(2);
                }
            }

            speedEl.textContent = String(Math.round(Math.abs(car.speed) * 6));
            
            updateCamera();
            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }

        // Input handling
        function mapKey(code, active) {
            if (code === 'ArrowUp' || code === 'KeyW') keys.up = active;
            if (code === 'ArrowDown' || code === 'KeyS') keys.down = active;
            if (code === 'ArrowLeft' || code === 'KeyA') keys.left = active;
            if (code === 'ArrowRight' || code === 'KeyD') keys.right = active;
        }

        document.addEventListener('keydown', (event) => {
            mapKey(event.code, true);
            if (event.code.startsWith('Arrow')) event.preventDefault();
        });

        document.addEventListener('keyup', (event) => {
            mapKey(event.code, false);
        });

        // Touch controls
        for (const btn of document.querySelectorAll('.touch button')) {
            const key = btn.getAttribute('data-key');
            btn.addEventListener('touchstart', (event) => {
                event.preventDefault();
                keys[key] = true;
            }, { passive: false });
            btn.addEventListener('touchend', () => {
                keys[key] = false;
            });
            btn.addEventListener('mousedown', () => {
                keys[key] = true;
            });
            btn.addEventListener('mouseup', () => {
                keys[key] = false;
            });
            btn.addEventListener('mouseleave', () => {
                keys[key] = false;
            });
        }

        // Button handlers
        document.getElementById('restartBtn').addEventListener('click', resetRace);
        document.getElementById('finishRestartBtn').addEventListener('click', resetRace);
        document.getElementById('cameraBtn').addEventListener('click', () => {
            cameraMode = (cameraMode + 1) % 3;
        });

        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize and start
        updateBest();
        resetRace();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
