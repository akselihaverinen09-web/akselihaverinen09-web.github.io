<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Napoli Now | Yllapito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-left"></div>
  <div class="bg-shape bg-shape-right"></div>

  <header class="site-header admin-header">
    <div>
      <p class="eyebrow">Yllapitajan nakyma</p>
      <h1>Menun muokkaus ja tilausten hallinta</h1>
      <p class="lead">Tassa nakymassa paivitat pizza menua ja kasittelet asiakkaiden tilauksia.</p>
    </div>
    <a class="admin-link" href="pizza.html">Takaisin asiakasnakymaan</a>
  </header>

  <main class="layout admin-layout">
    <section class="card">
      <h2>Menu editor</h2>
      <form id="addPizzaForm" class="checkout-form compact-form">
        <div class="split-row">
          <div class="form-row">
            <label for="pizzaName">Nimi</label>
            <input id="pizzaName" name="pizzaName" type="text" required />
          </div>
          <div class="form-row">
            <label for="pizzaPrice">Hinta (EUR)</label>
            <input id="pizzaPrice" name="pizzaPrice" type="number" min="1" step="0.5" required />
          </div>
        </div>
        <div class="form-row">
          <label for="pizzaDescription">Kuvaus</label>
          <input id="pizzaDescription" name="pizzaDescription" type="text" required />
        </div>
        <div class="form-row">
          <label for="pizzaToppings">Taytteet (pilkulla eroteltuna)</label>
          <input id="pizzaToppings" name="pizzaToppings" type="text" placeholder="mozzarella, basilika, oliivi" required />
        </div>
        <div class="form-row">
          <label for="pizzaImage">Kuva (valinnainen URL tai polku)</label>
          <input id="pizzaImage" name="pizzaImage" type="text" placeholder="https://images.unsplash.com/..." />
        </div>
        <button type="submit" class="primary-btn">Lisaa pizza menuun</button>
      </form>

      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Nimi</th>
              <th>Kuvaus</th>
              <th>Taytteet</th>
              <th>Hinta</th>
              <th>Toiminnot</th>
            </tr>
          </thead>
          <tbody id="menuTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="section-title-row">
        <h2>Tilaukset</h2>
        <button id="refreshOrders" class="ghost-btn" type="button">Paivita</button>
      </div>
      <div id="ordersList" class="orders-list"></div>
      <button id="clearOrders" class="danger-btn" type="button">Tyhjenna kaikki tilaukset</button>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
