<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Rush - Akseli Haverinen</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #8ec5ff 0%, #cdeaff 42%, #f2fbff 100%);
            color: #102030;
            display: flex;
            justify-content: center;
            padding: 22px;
        }

        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #f6fbff;
            background: #102030cf;
            border: 1px solid #ffffff55;
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 700;
        }

        .wrap {
            width: min(980px, 100%);
            background: #0f1c2cdd;
            border: 1px solid #ffffff3a;
            border-radius: 18px;
            padding: 14px;
            box-shadow: 0 20px 48px #00000040;
            color: #e9f4ff;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 6px 4px 10px;
        }

        h1 { font-size: 1.25rem; }

        .hud {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-weight: 700;
            font-size: 0.92rem;
        }

        .pill {
            background: #ffffff14;
            border: 1px solid #ffffff2d;
            border-radius: 999px;
            padding: 6px 12px;
        }

        .frame {
            border: 2px solid #ffffff33;
            border-radius: 12px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
            background: #dff4ff;
        }

        .controls {
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .hint { font-size: 0.9rem; color: #d6e8ff; }

        .buttons { display: flex; gap: 8px; }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            color: #102030;
            background: #ffe282;
        }

        .secondary { background: #dbe8f2; }

        @media (max-width: 760px) {
            h1 { font-size: 1.05rem; }
            .hud { font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <a class="back-link" href="projektit.html">&larr; Takaisin projekteihin</a>

    <section class="wrap">
        <div class="top">
            <h1>Ski Rush - Endless Downhill</h1>
            <div class="hud">
                <span class="pill">Pisteet: <strong id="score">0</strong></span>
                <span class="pill">Nopeus: <strong id="speed">1.0x</strong></span>
                <span class="pill">Paras: <strong id="best">0</strong></span>
            </div>
        </div>

        <div class="frame">
            <canvas id="game" width="940" height="540"></canvas>
        </div>

        <div class="controls">
            <p class="hint">Vasen/oikea tai A/D: väistä puita. Paina Shift turboon (lyhyt boost).</p>
            <div class="buttons">
                <button id="restartBtn" type="button">Aloita alusta</button>
                <button id="difficultyBtn" class="secondary" type="button">Vaikeus: Normaali</button>
            </div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const scoreEl = document.getElementById('score');
        const speedEl = document.getElementById('speed');
        const bestEl = document.getElementById('best');

        const state = {
            lanes: 9,
            laneWidth: canvas.width / 9,
            playerLane: 4,
            playerX: canvas.width / 2,
            playerY: canvas.height - 110,
            obstacles: [],
            particles: [],
            score: 0,
            best: Number(localStorage.getItem('ski-rush-best') || 0),
            speed: 3.2,
            baseSpeed: 3.2,
            spawnTick: 0,
            spawnRate: 34,
            gameOver: false,
            difficulty: 'normal',
            boost: 0,
            time: 0
        };

        const keys = { left: false, right: false, boost: false };

        function updateBest() {
            bestEl.textContent = String(Math.floor(state.best));
        }

        function reset() {
            state.playerLane = 4;
            state.playerX = laneToX(state.playerLane);
            state.obstacles = [];
            state.particles = [];
            state.score = 0;
            state.speed = state.baseSpeed;
            state.spawnTick = 0;
            state.gameOver = false;
            state.boost = 0;
            state.time = 0;
            scoreEl.textContent = '0';
            speedEl.textContent = '1.0x';
        }

        function laneToX(lane) {
            return lane * state.laneWidth + state.laneWidth / 2;
        }

        function setDifficulty(mode) {
            state.difficulty = mode;
            if (mode === 'easy') {
                state.baseSpeed = 2.6;
                state.spawnRate = 42;
            } else if (mode === 'hard') {
                state.baseSpeed = 3.9;
                state.spawnRate = 27;
            } else {
                state.baseSpeed = 3.2;
                state.spawnRate = 34;
            }
            state.speed = state.baseSpeed;
        }

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * state.lanes);
            const isRock = Math.random() < 0.26;
            state.obstacles.push({
                lane,
                x: laneToX(lane),
                y: -40,
                size: isRock ? 20 : 28,
                type: isRock ? 'rock' : 'tree'
            });
        }

        function makeSnowTrail() {
            for (let i = 0; i < 2; i++) {
                state.particles.push({
                    x: state.playerX + (Math.random() - 0.5) * 14,
                    y: state.playerY + 20,
                    vy: 0.8 + Math.random() * 1.2,
                    life: 24 + Math.random() * 10
                });
            }
        }

        function update() {
            if (state.gameOver) return;

            state.time += 1;

            if (keys.left) state.playerLane -= 0.22;
            if (keys.right) state.playerLane += 0.22;
            state.playerLane = Math.max(0, Math.min(state.lanes - 1, state.playerLane));
            const targetX = laneToX(state.playerLane);
            state.playerX += (targetX - state.playerX) * 0.2;

            if (keys.boost && state.boost < 120) {
                state.boost += 1.4;
            } else {
                state.boost *= 0.92;
            }

            const boostFactor = 1 + Math.min(state.boost / 120, 0.55);
            state.speed = state.baseSpeed + state.time * 0.00045;
            const moveSpeed = state.speed * boostFactor;

            state.spawnTick += 1;
            if (state.spawnTick >= state.spawnRate) {
                state.spawnTick = 0;
                spawnObstacle();
            }

            for (const o of state.obstacles) {
                o.y += moveSpeed * (o.type === 'rock' ? 1.06 : 1);
                const hitX = Math.abs(o.x - state.playerX) < (o.size + 14);
                const hitY = Math.abs(o.y - state.playerY) < (o.size + 12);
                if (hitX && hitY) {
                    state.gameOver = true;
                    if (state.score > state.best) {
                        state.best = state.score;
                        localStorage.setItem('ski-rush-best', String(state.best));
                        updateBest();
                    }
                }
            }

            state.obstacles = state.obstacles.filter((o) => o.y < canvas.height + 80);

            makeSnowTrail();
            for (const p of state.particles) {
                p.y += p.vy;
                p.life -= 1;
            }
            state.particles = state.particles.filter((p) => p.life > 0);

            state.score += 1.3 * boostFactor;
            scoreEl.textContent = String(Math.floor(state.score));
            speedEl.textContent = (moveSpeed / state.baseSpeed).toFixed(1) + 'x';
        }

        function drawSlope() {
            const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
            g.addColorStop(0, '#eaf8ff');
            g.addColorStop(1, '#cdeeff');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i <= state.lanes; i++) {
                const x = i * state.laneWidth;
                ctx.strokeStyle = '#ffffff44';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            ctx.fillStyle = '#b0dfff';
            for (let i = 0; i < 40; i++) {
                const x = (i * 97 + state.time * 0.4) % canvas.width;
                const y = (i * 61 + state.time * 1.2) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }
        }

        function drawObstacles() {
            for (const o of state.obstacles) {
                if (o.type === 'tree') {
                    ctx.fillStyle = '#225f3d';
                    ctx.beginPath();
                    ctx.moveTo(o.x, o.y - 24);
                    ctx.lineTo(o.x - 18, o.y + 16);
                    ctx.lineTo(o.x + 18, o.y + 16);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = '#6a4a2d';
                    ctx.fillRect(o.x - 3, o.y + 12, 6, 14);
                } else {
                    ctx.fillStyle = '#8796a4';
                    ctx.beginPath();
                    ctx.arc(o.x, o.y, 16, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(state.playerX, state.playerY);

            ctx.fillStyle = '#ff5f37';
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(-12, 16);
            ctx.lineTo(12, 16);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#19334f';
            ctx.fillRect(-20, 16, 16, 4);
            ctx.fillRect(4, 16, 16, 4);

            ctx.restore();
        }

        function drawTrail() {
            ctx.fillStyle = '#ffffffcc';
            for (const p of state.particles) {
                ctx.globalAlpha = Math.max(0, p.life / 35);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function drawOverlay() {
            if (!state.gameOver) return;

            ctx.fillStyle = '#0d1a2acc';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#f5fbff';
            ctx.textAlign = 'center';
            ctx.font = '700 44px Trebuchet MS';
            ctx.fillText('Kaatuit!', canvas.width / 2, canvas.height / 2 - 20);

            ctx.font = '700 24px Trebuchet MS';
            ctx.fillText('Pisteet: ' + Math.floor(state.score), canvas.width / 2, canvas.height / 2 + 20);

            ctx.font = '500 18px Trebuchet MS';
            ctx.fillText('Paina Aloita alusta', canvas.width / 2, canvas.height / 2 + 52);
        }

        function draw() {
            drawSlope();
            drawTrail();
            drawObstacles();
            drawPlayer();
            drawOverlay();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function mapKey(code, down) {
            if (code === 'ArrowLeft' || code === 'KeyA') keys.left = down;
            if (code === 'ArrowRight' || code === 'KeyD') keys.right = down;
            if (code === 'ShiftLeft' || code === 'ShiftRight') keys.boost = down;
        }

        document.addEventListener('keydown', (e) => {
            mapKey(e.code, true);
            if (e.code.startsWith('Arrow')) e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            mapKey(e.code, false);
        });

        document.getElementById('restartBtn').addEventListener('click', reset);

        const difficultyBtn = document.getElementById('difficultyBtn');
        difficultyBtn.addEventListener('click', () => {
            if (state.difficulty === 'normal') {
                setDifficulty('hard');
                difficultyBtn.textContent = 'Vaikeus: Vaikea';
            } else if (state.difficulty === 'hard') {
                setDifficulty('easy');
                difficultyBtn.textContent = 'Vaikeus: Helppo';
            } else {
                setDifficulty('normal');
                difficultyBtn.textContent = 'Vaikeus: Normaali';
            }
            reset();
        });

        updateBest();
        reset();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
