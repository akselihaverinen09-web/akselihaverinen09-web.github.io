<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Physics Simulator - Akseli Haverinen</title>
    <link rel="stylesheet" href="css/beamng.css">
</head>
<body>
    <div class="loading" id="loading">
        <h2>Loading Physics Engine...</h2>
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-item">FPS: <span id="fps">60</span></div>
        <div class="hud-item">Camera: <span id="cameraMode">Follow</span></div>
        <div class="hud-item">Vehicle: <span id="vehicleType">Sedan</span></div>
    </div>

    <!-- Speedometer -->
    <div class="speedometer">
        <div class="speed-display" id="speed">0</div>
        <div class="speed-label">km/h</div>
    </div>

    <!-- Damage Indicator -->
    <div class="damage-indicator">
        <div class="damage-text">Vehicle Integrity</div>
        <div class="damage-bar-container">
            <div class="damage-bar" id="damageBar" style="width: 100%;"></div>
        </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls-panel">
        <h3>Controls</h3>
        <ul>
            <li><span class="key">W/↑</span> Accelerate</li>
            <li><span class="key">S/↓</span> Brake/Reverse</li>
            <li><span class="key">A/←</span> Steer Left</li>
            <li><span class="key">D/→</span> Steer Right</li>
            <li><span class="key">SPACE</span> Handbrake</li>
            <li><span class="key">C</span> Change Camera</li>
            <li><span class="key">R</span> Reset Vehicle</li>
        </ul>
    </div>

    <!-- Buttons -->
    <div class="button-group">
        <button class="btn btn-primary" id="resetBtn">Reset Vehicle</button>
        <button class="btn btn-secondary" id="cameraBtn">Change Camera</button>
        <button class="btn btn-warning" id="crashBtn">Test Crash</button>
    </div>

    <a class="back-link" href="projektit.html">← Back to Projects</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://threejs.org/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        if (!window.THREE || !window.CANNON) {
            const loading = document.getElementById('loading');
            loading.innerHTML = '<h2>Failed to load 3D libraries</h2><p>Check internet connection and reload.</p>';
            throw new Error('Missing required libraries: THREE or CANNON');
        }

        const canvas = document.getElementById('gameCanvas');
        const fpsEl = document.getElementById('fps');
        const speedEl = document.getElementById('speed');
        const damageBar = document.getElementById('damageBar');
        const cameraModeEl = document.getElementById('cameraMode');
        const loadingEl = document.getElementById('loading');
        const loadingProgress = document.getElementById('loadingProgress');

        function updateLoading(progress) {
            loadingProgress.style.width = progress + '%';
            if (progress >= 100) {
                setTimeout(() => loadingEl.classList.add('hidden'), 300);
            }
        }

        setTimeout(() => loadingEl.classList.add('hidden'), 9000);
        updateLoading(10);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x9fd3ff);
        scene.fog = new THREE.Fog(0x9fd3ff, 130, 700);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1200);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.solver.iterations = 10;

        updateLoading(22);

        const ambientLight = new THREE.HemisphereLight(0xffffff, 0x4b6b3a, 0.75);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
        sunLight.position.set(80, 140, 60);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);

        const groundMat = new THREE.MeshStandardMaterial({ color: 0x688d57, roughness: 0.9 });
        const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(1200, 1200), groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        const roadMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(18, 420),
            new THREE.MeshStandardMaterial({ color: 0x3f4144, roughness: 0.85 })
        );
        roadMesh.rotation.x = -Math.PI / 2;
        roadMesh.position.y = 0.02;
        roadMesh.receiveShadow = true;
        scene.add(roadMesh);

        for (let i = -200; i < 200; i += 12) {
            const stripe = new THREE.Mesh(
                new THREE.PlaneGeometry(0.5, 5),
                new THREE.MeshBasicMaterial({ color: 0xf7f7f7 })
            );
            stripe.rotation.x = -Math.PI / 2;
            stripe.position.set(0, 0.03, i);
            scene.add(stripe);
        }

        function addStaticObstacle(x, y, z, sx, sy, sz, color) {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(sx, sy, sz),
                new THREE.MeshStandardMaterial({ color })
            );
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            const body = new CANNON.Body({
                mass: 0,
                shape: new CANNON.Box(new CANNON.Vec3(sx / 2, sy / 2, sz / 2))
            });
            body.position.copy(mesh.position);
            world.addBody(body);
        }

        for (let i = 0; i < 8; i++) {
            addStaticObstacle(-7 + i * 2, 0.6, 80, 1.6, 1.2, 1.6, i % 2 ? 0xffffff : 0xee3333);
        }
        addStaticObstacle(0, 0.45, -70, 12, 0.9, 20, 0x9e7e58);

        updateLoading(42);

        const wheelMeshes = [];
        const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x101010, roughness: 0.95 });
        for (let i = 0; i < 4; i++) {
            const w = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.28, 20), wheelMaterial);
            w.rotation.z = Math.PI / 2;
            w.castShadow = true;
            scene.add(w);
            wheelMeshes.push(w);
        }

        const chassisShape = new CANNON.Box(new CANNON.Vec3(1.05, 0.45, 2.15));
        const chassisBody = new CANNON.Body({ mass: 1250 });
        chassisBody.addShape(chassisShape);
        chassisBody.position.set(0, 2.2, 0);
        chassisBody.angularDamping = 0.45;
        world.addBody(chassisBody);

        const vehicle = new CANNON.RaycastVehicle({
            chassisBody,
            indexRightAxis: 0,
            indexUpAxis: 1,
            indexForwardAxis: 2
        });

        const wheelOptions = {
            radius: 0.42,
            directionLocal: new CANNON.Vec3(0, -1, 0),
            suspensionStiffness: 36,
            suspensionRestLength: 0.28,
            frictionSlip: 3.8,
            dampingRelaxation: 2.3,
            dampingCompression: 4.4,
            maxSuspensionForce: 100000,
            rollInfluence: 0.01,
            axleLocal: new CANNON.Vec3(-1, 0, 0),
            maxSuspensionTravel: 0.3,
            customSlidingRotationalSpeed: -30,
            useCustomSlidingRotationalSpeed: true
        };

        wheelOptions.chassisConnectionPointLocal = new CANNON.Vec3(0.95, 0, 1.45);
        vehicle.addWheel(wheelOptions);
        wheelOptions.chassisConnectionPointLocal = new CANNON.Vec3(-0.95, 0, 1.45);
        vehicle.addWheel(wheelOptions);
        wheelOptions.chassisConnectionPointLocal = new CANNON.Vec3(0.95, 0, -1.45);
        vehicle.addWheel(wheelOptions);
        wheelOptions.chassisConnectionPointLocal = new CANNON.Vec3(-0.95, 0, -1.45);
        vehicle.addWheel(wheelOptions);
        vehicle.addToWorld(world);

        const wheelBodies = [];
        vehicle.wheelInfos.forEach(() => {
            const body = new CANNON.Body({ mass: 1 });
            body.type = CANNON.Body.KINEMATIC;
            body.collisionFilterGroup = 0;
            body.addShape(new CANNON.Sphere(0.42));
            wheelBodies.push(body);
            world.addBody(body);
        });

        let carVisual = new THREE.Group();
        let realModelLoaded = false;

        function createFallbackCar() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.1, 0.9, 4.2),
                new THREE.MeshStandardMaterial({ color: 0xff4b2b, metalness: 0.55, roughness: 0.35 })
            );
            body.castShadow = true;
            group.add(body);

            const roof = new THREE.Mesh(
                new THREE.BoxGeometry(1.8, 0.65, 2.2),
                new THREE.MeshStandardMaterial({ color: 0x22262a, metalness: 0.2, roughness: 0.6 })
            );
            roof.position.set(0, 0.7, -0.35);
            roof.castShadow = true;
            group.add(roof);
            return group;
        }

        function loadCarModel() {
            carVisual = createFallbackCar();
            scene.add(carVisual);

            if (!THREE.GLTFLoader) {
                return;
            }

            const loader = new THREE.GLTFLoader();
            loader.load(
                'https://threejs.org/examples/models/gltf/ferrari.glb',
                (gltf) => {
                    scene.remove(carVisual);
                    carVisual = gltf.scene;
                    carVisual.scale.set(0.0095, 0.0095, 0.0095);
                    carVisual.traverse((obj) => {
                        if (obj.isMesh) {
                            obj.castShadow = true;
                            obj.receiveShadow = true;
                        }
                    });
                    scene.add(carVisual);
                    realModelLoaded = true;
                    document.getElementById('vehicleType').textContent = 'Ferrari (GLB)';
                },
                undefined,
                () => {
                    document.getElementById('vehicleType').textContent = 'Sports Car (fallback)';
                }
            );
        }

        loadCarModel();
        updateLoading(60);

        let damage = 0;
        let lastSpeed = 0;
        chassisBody.addEventListener('collide', (event) => {
            const impact = event.contact.getImpactVelocityAlongNormal();
            if (impact > 3) {
                damage = Math.min(100, damage + impact * 0.7);
            }
        });

        const keys = { up: false, down: false, left: false, right: false, space: false };
        let cameraMode = 0;
        const cameraModes = ['Follow', 'Chase', 'Top View'];

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = true;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space') {
                keys.space = true;
                e.preventDefault();
            }
            if (e.code === 'KeyC') {
                cameraMode = (cameraMode + 1) % 3;
                cameraModeEl.textContent = cameraModes[cameraMode];
            }
            if (e.code === 'KeyR') resetVehicle();
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'Space') keys.space = false;
        });

        function resetVehicle() {
            chassisBody.position.set(0, 2.2, 0);
            chassisBody.velocity.set(0, 0, 0);
            chassisBody.angularVelocity.set(0, 0, 0);
            chassisBody.quaternion.set(0, 0, 0, 1);
            damage = 0;
            damageBar.style.width = '100%';
        }

        document.getElementById('resetBtn').addEventListener('click', resetVehicle);
        document.getElementById('cameraBtn').addEventListener('click', () => {
            cameraMode = (cameraMode + 1) % 3;
            cameraModeEl.textContent = cameraModes[cameraMode];
        });
        document.getElementById('crashBtn').addEventListener('click', () => {
            chassisBody.velocity.set(0, 8, 34);
            chassisBody.angularVelocity.set(0.5, 2.3, 0.2);
        });

        function applyControls() {
            const maxSteer = 0.45;
            const engineForce = 3200;
            const brakeForce = keys.space ? 25 : 0;

            vehicle.setBrake(brakeForce, 0);
            vehicle.setBrake(brakeForce, 1);
            vehicle.setBrake(brakeForce, 2);
            vehicle.setBrake(brakeForce, 3);

            let steer = 0;
            if (keys.left) steer = maxSteer;
            if (keys.right) steer = -maxSteer;
            vehicle.setSteeringValue(steer, 0);
            vehicle.setSteeringValue(steer, 1);

            let force = 0;
            if (keys.up) force = -engineForce;
            if (keys.down) force = engineForce * 0.55;
            vehicle.applyEngineForce(force, 2);
            vehicle.applyEngineForce(force, 3);
        }

        function updateVisuals() {
            for (let i = 0; i < vehicle.wheelInfos.length; i++) {
                vehicle.updateWheelTransform(i);
                const transform = vehicle.wheelInfos[i].worldTransform;
                wheelBodies[i].position.copy(transform.position);
                wheelBodies[i].quaternion.copy(transform.quaternion);
                wheelMeshes[i].position.copy(transform.position);
                wheelMeshes[i].quaternion.copy(transform.quaternion);
            }

            carVisual.position.copy(chassisBody.position);
            carVisual.quaternion.copy(chassisBody.quaternion);
            if (realModelLoaded) {
                carVisual.position.y -= 0.65;
                carVisual.rotation.y += Math.PI;
            }

            const speedKmh = Math.round(chassisBody.velocity.length() * 3.6);
            speedEl.textContent = speedKmh;

            const delta = Math.max(0, lastSpeed - speedKmh);
            if (delta > 18) {
                damage = Math.min(100, damage + delta * 0.1);
            }
            lastSpeed = speedKmh;
            damageBar.style.width = `${Math.max(0, 100 - damage)}%`;
        }

        function updateCamera() {
            const pos = chassisBody.position;
            const q = chassisBody.quaternion;
            const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(
                new THREE.Quaternion(q.x, q.y, q.z, q.w)
            );

            if (cameraMode === 0) {
                const target = new THREE.Vector3(pos.x, pos.y + 2.8, pos.z).addScaledVector(forward, -10);
                camera.position.lerp(target, 0.1);
                camera.lookAt(pos.x, pos.y + 1.2, pos.z);
            } else if (cameraMode === 1) {
                const target = new THREE.Vector3(pos.x, pos.y + 1.8, pos.z).addScaledVector(forward, -6.5);
                camera.position.lerp(target, 0.14);
                camera.lookAt(pos.x, pos.y + 0.9, pos.z);
            } else {
                const top = new THREE.Vector3(pos.x, 42, pos.z + 0.1);
                camera.position.lerp(top, 0.12);
                camera.lookAt(pos.x, 0, pos.z);
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateLoading(100);

        let lastTime = performance.now();
        let frameCount = 0;
        let fpsAccum = 0;

        function animate(now) {
            requestAnimationFrame(animate);
            const dt = Math.min((now - lastTime) / 1000, 0.05);
            lastTime = now;

            applyControls();
            world.step(1 / 60, dt, 3);
            updateVisuals();
            updateCamera();

            renderer.render(scene, camera);

            frameCount += 1;
            fpsAccum += dt;
            if (fpsAccum >= 1) {
                fpsEl.textContent = String(frameCount);
                frameCount = 0;
                fpsAccum = 0;
            }
        }

        animate(performance.now());
    </script>
</body>
</html>
