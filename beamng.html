<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Physics Simulator - Akseli Haverinen</title>
    <link rel="stylesheet" href="css/beamng.css">
</head>
<body>
    <div class="loading" id="loading">
        <h2>Loading Physics Engine...</h2>
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-item">FPS: <span id="fps">60</span></div>
        <div class="hud-item">Camera: <span id="cameraMode">Follow</span></div>
        <div class="hud-item">Vehicle: <span id="vehicleType">Sedan</span></div>
    </div>

    <!-- Speedometer -->
    <div class="speedometer">
        <div class="speed-display" id="speed">0</div>
        <div class="speed-label">km/h</div>
    </div>

    <!-- Damage Indicator -->
    <div class="damage-indicator">
        <div class="damage-text">Vehicle Integrity</div>
        <div class="damage-bar-container">
            <div class="damage-bar" id="damageBar" style="width: 100%;"></div>
        </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls-panel">
        <h3>Controls</h3>
        <ul>
            <li><span class="key">W/↑</span> Accelerate</li>
            <li><span class="key">S/↓</span> Brake/Reverse</li>
            <li><span class="key">A/←</span> Steer Left</li>
            <li><span class="key">D/→</span> Steer Right</li>
            <li><span class="key">SPACE</span> Handbrake</li>
            <li><span class="key">C</span> Change Camera</li>
            <li><span class="key">R</span> Reset Vehicle</li>
        </ul>
    </div>

    <!-- Buttons -->
    <div class="button-group">
        <button class="btn btn-primary" id="resetBtn">Reset Vehicle</button>
        <button class="btn btn-secondary" id="cameraBtn">Change Camera</button>
        <button class="btn btn-warning" id="crashBtn">Test Crash</button>
    </div>

    <a class="back-link" href="projektit.html">← Back to Projects</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script>
        // Wait for libraries to load
        window.addEventListener('load', () => {
            initGame();
        });

        function initGame() {
        // Initialize loading
        const loadingEl = document.getElementById('loading');
        const loadingProgress = document.getElementById('loadingProgress');
        let loadProgress = 0;

        function updateLoading(progress) {
            loadProgress = progress;
            loadingProgress.style.width = progress + '%';
            if (progress >= 100) {
                setTimeout(() => {
                    loadingEl.classList.add('hidden');
                }, 500);
            }
        }

        updateLoading(20);

        // DOM Elements
        const canvas = document.getElementById('gameCanvas');
        const fpsEl = document.getElementById('fps');
        const speedEl = document.getElementById('speed');
        const damageBar = document.getElementById('damageBar');
        const cameraModeEl = document.getElementById('cameraMode');

        // Three.js Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 100, 500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        updateLoading(40);

        // Cannon.js Physics World
        const world = new CANNON.World();
        world.gravity.set(0, -20, 0);
        world.broadphase = new CANNON.NaiveBroadphase();
        world.solver.iterations = 10;

        // Materials
        const groundMaterial = new CANNON.Material('ground');
        const wheelMaterial = new CANNON.Material('wheel');
        const wheelGroundContact = new CANNON.ContactMaterial(wheelMaterial, groundMaterial, {
            friction: 0.7,
            restitution: 0.1
        });
        world.addContactMaterial(wheelGroundContact);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(100, 150, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.left = -100;
        sunLight.shadow.camera.right = 100;
        sunLight.shadow.camera.top = 100;
        sunLight.shadow.camera.bottom = -100;
        scene.add(sunLight);

        updateLoading(60);

        // Create Ground with Hills
        function createTerrain() {
            const groundGeometry = new THREE.PlaneGeometry(400, 400, 50, 50);
            const vertices = groundGeometry.attributes.position.array;
            
            // Add hills
            for (let i = 0; i < vertices.length; i += 3) {
                const x = vertices[i];
                const y = vertices[i + 1];
                vertices[i + 2] = Math.sin(x * 0.05) * Math.cos(y * 0.08) * 5 + 
                                  Math.sin(x * 0.02) * 3;
            }
            groundGeometry.computeVertexNormals();

            const groundMeshMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x688d57,
                roughness: 0.9
            });
            
            const ground = new THREE.Mesh(groundGeometry, groundMeshMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Physics ground
            const groundBody = new CANNON.Body({
                mass: 0,
                shape: new CANNON.Plane(),
                material: groundMaterial
            });
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);
        }

        // Create Road
        function createRoad() {
            const roadGeometry = new THREE.PlaneGeometry(12, 200);
            const roadMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x444444,
                roughness: 0.8
            });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.02;
            road.receiveShadow = true;
            scene.add(road);

            // Road lines
            for (let i = -90; i < 90; i += 10) {
                const lineGeometry = new THREE.PlaneGeometry(0.3, 4);
                const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const line = new THREE.Mesh(lineGeometry, lineMaterial);
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.03, i);
                scene.add(line);
            }
        }

        // Create Obstacles
        function createObstacles() {
            // Ramps
            const rampGeometry = new THREE.BoxGeometry(10, 2, 15);
            const rampMaterial = new THREE.MeshStandardMaterial({ color: 0x8b7355 });
            
            const ramp1 = new THREE.Mesh(rampGeometry, rampMaterial);
            ramp1.position.set(20, 0.5, -30);
            ramp1.rotation.x = -0.3;
            ramp1.castShadow = true;
            ramp1.receiveShadow = true;
            scene.add(ramp1);

            // Barriers
            for (let i = 0; i < 5; i++) {
                const barrierGeometry = new THREE.BoxGeometry(0.5, 1, 3);
                const barrierMaterial = new THREE.MeshStandardMaterial({ 
                    color: i % 2 === 0 ? 0xff0000 : 0xffffff 
                });
                const barrier = new THREE.Mesh(barrierGeometry, barrierMaterial);
                barrier.position.set(-25 + i * 2, 0.5, 40);
                barrier.castShadow = true;
                barrier.receiveShadow = true;
                scene.add(barrier);

                // Physics body for barrier
                const barrierBody = new CANNON.Body({
                    mass: 50,
                    shape: new CANNON.Box(new CANNON.Vec3(0.25, 0.5, 1.5))
                });
                barrierBody.position.set(barrier.position.x, barrier.position.y, barrier.position.z);
                world.addBody(barrierBody);
            }
        }

        updateLoading(80);

        // Create Vehicle with Soft-Body Elements
        class Vehicle {
            constructor() {
                this.group = new THREE.Group();
                this.damage = 0;
                this.maxDamage = 100;
                
                // Car body physics
                this.chassisBody = new CANNON.Body({
                    mass: 1200,
                    shape: new CANNON.Box(new CANNON.Vec3(1, 0.5, 2)),
                    position: new CANNON.Vec3(0, 3, 0)
                });
                world.addBody(this.chassisBody);

                // Visual mesh
                this.createVisuals();
                
                // Wheels
                this.wheels = [];
                this.wheelBodies = [];
                this.createWheels();
                
                scene.add(this.group);

                // Vehicle properties
                this.engineForce = 0;
                this.brakeForce = 0;
                this.steeringAngle = 0;
                this.maxEngineForce = 2000;
                this.maxBrakeForce = 1000;
                this.maxSteerAngle = 0.5;
            }

            createVisuals() {
                // Main body
                const bodyGeometry = new THREE.BoxGeometry(2, 1, 4);
                const bodyMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xff6b35,
                    metalness: 0.7,
                    roughness: 0.3
                });
                this.bodyMesh = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.bodyMesh.castShadow = true;
                this.bodyMesh.receiveShadow = true;
                this.group.add(this.bodyMesh);

                // Roof
                const roofGeometry = new THREE.BoxGeometry(1.8, 0.7, 2);
                const roofMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x333333,
                    metalness: 0.6,
                    roughness: 0.4
                });
                const roof = new THREE.Mesh(roofGeometry, roofMaterial);
                roof.position.y = 0.85;
                roof.position.z = -0.3;
                roof.castShadow = true;
                this.group.add(roof);

                // Windows
                const windowMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x6dd5fa,
                    metalness: 0.9,
                    roughness: 0.1,
                    transparent: true,
                    opacity: 0.5
                });
                
                const frontWindowGeometry = new THREE.BoxGeometry(1.7, 0.6, 0.8);
                const frontWindow = new THREE.Mesh(frontWindowGeometry, windowMaterial);
                frontWindow.position.set(0, 0.85, 0.8);
                this.group.add(frontWindow);

                // Hood
                const hoodGeometry = new THREE.BoxGeometry(1.6, 0.3, 1.5);
                const hoodMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xff7f50,
                    metalness: 0.8,
                    roughness: 0.2
                });
                const hood = new THREE.Mesh(hoodGeometry, hoodMaterial);
                hood.position.set(0, 0.65, 1.6);
                hood.castShadow = true;
                this.group.add(hood);
            }

            createWheels() {
                const carPos = this.chassisBody.position;
                const wheelPositions = [
                    { x: -1, z: 1.3 },
                    { x: 1, z: 1.3 },
                    { x: -1, z: -1.3 },
                    { x: 1, z: -1.3 }
                ];

                wheelPositions.forEach((pos, index) => {
                    // Visual wheel
                    const wheelGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
                    const wheelMaterial = new THREE.MeshStandardMaterial({ 
                        color: 0x1a1a1a,
                        roughness: 0.9
                    });
                    const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.castShadow = true;
                    this.wheels.push(wheel);
                    this.group.add(wheel);

                    // Physics wheel
                    const wheelBody = new CANNON.Body({
                        mass: 30,
                        shape: new CANNON.Sphere(0.4),
                        material: wheelMaterial
                    });
                    wheelBody.position.set(
                        carPos.x + pos.x,
                        carPos.y - 0.5,
                        carPos.z + pos.z
                    );
                    world.addBody(wheelBody);
                    this.wheelBodies.push(wheelBody);

                    // Spring constraint to chassis
                    const spring = new CANNON.Spring(this.chassisBody, wheelBody, {
                        restLength: 1,
                        stiffness: 500,
                        damping: 10,
                        localAnchorA: new CANNON.Vec3(pos.x, -0.7, pos.z),
                        localAnchorB: new CANNON.Vec3(0, 0, 0)
                    });
                    
                    world.addEventListener('postStep', () => {
                        spring.applyForce();
                    }0, 0),
                        pivotB: new CANNON.Vec3(0, 0, 0),
                        axisB: new CANNON.Vec3(1, 0, 0)
                    });
                    world.addConstraint(constraint);
                });
            }

            update() {
                // Update visual position from physics
                this.group.position.copy(this.chassisBody.position);
                this.group.quaternion.copy(this.chassisBody.quaternion);

                // Update wheel positions
                this.wheels.forEach((wheel, index) => {
                    wheel.position.copy(this.wheelBodies[index].position);
                    wheel.position.sub(this.group.position);
                    wheel.quaternion.copy(this.wheelBodies[index].quaternion);
                });

                // Apply engine force
                if (this.engineForce !== 0) {
                    const force = new CANNON.Vec3(
                        Math.sin(this.chassisBody.quaternion.toEuler().y) * this.engineForce,
                        0,
                        Math.cos(this.chassisBody.quaternion.toEuler().y) * this.engineForce
                    );
                    this.chassisBody.applyForce(force, new CANNON.Vec3(0, 0, 0));
                }

                // Calculate damage from velocity changes
                const speed = this.chassisBody.velocity.length();
                if (speed > 15) {
                    this.damage += 0.1;
                    this.damage = Math.min(this.damage, this.maxDamage);
                }

                // Update damage bar
                const integrity = 100 - (this.damage / this.maxDamage) * 100;
                damageBar.style.width = integrity + '%';
                
                // Apply damage effects
                if (this.damage > 50) {
                    this.bodyMesh.material.color.setHex(0x8b4513);
                }

                // Update speed display
                const kmh = Math.round(speed * 3.6);
                speedEl.textContent = kmh;
            }

            applyControl(engineForce, brakeForce, steerAngle) {
                this.engineForce = engineForce;
                this.brakeForce = brakeForce;
                this.steeringAngle = steerAngle;
            }

            reset() {
                this.chassisBody.position.set(0, 3, 0);
                this.chassisBody.velocity.set(0, 0, 0);
                this.chassisBody.angularVelocity.set(0, 0, 0);
                this.chassisBody.quaternion.set(0, 0, 0, 1);
                
                this.wheelBodies.forEach((wheelBody, index) => {
                    const pos = [
                        { x: -1, z: 1.3 },
                        { x: 1, z: 1.3 },
                        { x: -1, z: -1.3 },
                        { x: 1, z: -1.3 }
                    ][index];
                    wheelBody.position.set(pos.x, 2.5, pos.z);
                    wheelBody.velocity.set(0, 0, 0);
                    wheelBody.angularVelocity.set(0, 0, 0);
                });

                this.damage = 0;
                damageBar.style.width = '100%';
                this.bodyMesh.material.color.setHex(0xff6b35);
            }
        }

        const vehicle = new Vehicle();
        
        createTerrain();
        createRoad();
        createObstacles();

        updateLoading(100);

        // Camera modes
        let cameraMode = 0; // 0=follow, 1=chase, 2=top
        const cameraModes = ['Follow', 'Chase', 'Top View'];

        function updateCamera() {
            const carPos = vehicle.chassisBody.position;
            const carRot = vehicle.chassisBody.quaternion;
            const euler = carRot.toEuler();

            if (cameraMode === 0) {
                // Follow camera
                const distance = 12;
                const height = 5;
                const camX = carPos.x - Math.sin(euler.y) * distance;
                const camZ = carPos.z - Math.cos(euler.y) * distance;
                
                camera.position.x += (camX - camera.position.x) * 0.1;
                camera.position.y += (carPos.y + height - camera.position.y) * 0.1;
                camera.position.z += (camZ - camera.position.z) * 0.1;
                
                camera.lookAt(carPos.x, carPos.y + 1, carPos.z);
            } else if (cameraMode === 1) {
                // Chase camera (closer)
                const distance = 8;
                const height = 3;
                const camX = carPos.x - Math.sin(euler.y) * distance;
                const camZ = carPos.z - Math.cos(euler.y) * distance;
                
                camera.position.x += (camX - camera.position.x) * 0.15;
                camera.position.y += (carPos.y + height - camera.position.y) * 0.15;
                camera.position.z += (camZ - camera.position.z) * 0.15;
                
                camera.lookAt(carPos.x, carPos.y, carPos.z);
            } else {
                // Top view
                camera.position.x = carPos.x;
                camera.position.y = carPos.y + 40;
                camera.position.z = carPos.z;
                camera.lookAt(carPos.x, carPos.y, carPos.z - 10);
            }
        }

        // Input
        const keys = { 
            up: false, 
            down: false, 
            left: false, 
            right: false, 
            space: false 
        };

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = true;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space') {
                keys.space = true;
                e.preventDefault();
            }
            if (e.code === 'KeyC') {
                cameraMode = (cameraMode + 1) % 3;
                cameraModeEl.textContent = cameraModes[cameraMode];
            }
            if (e.code === 'KeyR') vehicle.reset();
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'Space') keys.space = false;
        });

        // Button handlers
        document.getElementById('resetBtn').addEventListener('click', () => vehicle.reset());
        document.getElementById('cameraBtn').addEventListener('click', () => {
            cameraMode = (cameraMode + 1) % 3;
            cameraModeEl.textContent = cameraModes[cameraMode];
        });
        document.getElementById('crashBtn').addEventListener('click', () => {
            // Launch vehicle for crash test
            vehicle.chassisBody.velocity.set(0, 10, 30);
            vehicle.chassisBody.angularVelocity.set(2, 1, 0);
        });

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Game Loop
        let lastTime = performance.now();
        let frameCount = 0;
        let fpsTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);

            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            // Update physics
            world.step(1 / 60, dt, 3);

            // Apply vehicle controls
            let engineForce = 0;
            let brakeForce = 0;
            let steerAngle = 0;

            if (keys.up) engineForce = vehicle.maxEngineForce;
            if (keys.down) engineForce = -vehicle.maxEngineForce * 0.5;
            if (keys.space) brakeForce = vehicle.maxBrakeForce;
            if (keys.left) steerAngle = vehicle.maxSteerAngle;
            if (keys.right) steerAngle = -vehicle.maxSteerAngle;

            vehicle.applyControl(engineForce, brakeForce, steerAngle);
            vehicle.update();

            // Update camera
            updateCamera();

            // Render
            renderer.render(scene, camera);

            // FPS counter
            frameCount++;
            fpsTime += dt;
            if (fpsTime >= 1) {
                fpsEl.textContent = frameCount;
                frameCount = 0;
                fpsTime = 0;
            }
        }

        animate(performance.now());
        } // End initGame
    </script>
</body>
</html>
