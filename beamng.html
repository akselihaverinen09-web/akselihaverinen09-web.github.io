<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Physics Simulator - Akseli Haverinen</title>
    <link rel="stylesheet" href="css/beamng.css">
</head>
<body>
    <div class="loading" id="loading">
        <h2>Loading Physics Engine...</h2>
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-item">FPS: <span id="fps">60</span></div>
        <div class="hud-item">Camera: <span id="cameraMode">Follow</span></div>
        <div class="hud-item">Vehicle: <span id="vehicleType">Sedan</span></div>
    </div>

    <!-- Speedometer -->
    <div class="speedometer">
        <div class="speed-display" id="speed">0</div>
        <div class="speed-label">km/h</div>
    </div>

    <!-- Damage Indicator -->
    <div class="damage-indicator">
        <div class="damage-text">Vehicle Integrity</div>
        <div class="damage-bar-container">
            <div class="damage-bar" id="damageBar" style="width: 100%;"></div>
        </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls-panel">
        <h3>Controls</h3>
        <ul>
            <li><span class="key">W/↑</span> Accelerate</li>
            <li><span class="key">S/↓</span> Brake/Reverse</li>
            <li><span class="key">A/←</span> Steer Left</li>
            <li><span class="key">D/→</span> Steer Right</li>
            <li><span class="key">SPACE</span> Handbrake</li>
            <li><span class="key">C</span> Change Camera</li>
            <li><span class="key">R</span> Reset Vehicle</li>
        </ul>
    </div>

    <!-- Buttons -->
    <div class="button-group">
        <button class="btn btn-primary" id="resetBtn">Reset Vehicle</button>
        <button class="btn btn-secondary" id="cameraBtn">Change Camera</button>
        <button class="btn btn-warning" id="crashBtn">Test Crash</button>
    </div>

    <a class="back-link" href="projektit.html">← Back to Projects</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script>
        if (!window.THREE || !window.CANNON) {
            const loading = document.getElementById('loading');
            loading.innerHTML = '<h2>Failed to load 3D libraries</h2><p>Check internet connection and reload.</p>';
            throw new Error('Missing required libraries: THREE or CANNON');
        }

        // DOM Elements
        const canvas = document.getElementById('gameCanvas');
        const fpsEl = document.getElementById('fps');
        const speedEl = document.getElementById('speed');
        const damageBar = document.getElementById('damageBar');
        const cameraModeEl = document.getElementById('cameraMode');
        const loadingEl = document.getElementById('loading');
        const loadingProgress = document.getElementById('loadingProgress');

        function updateLoading(progress) {
            loadingProgress.style.width = progress + '%';
            if (progress >= 100) {
                setTimeout(() => {
                    loadingEl.classList.add('hidden');
                }, 500);
            }
        }

        // Fail-safe: never keep the loading overlay forever.
        setTimeout(() => {
            loadingEl.classList.add('hidden');
        }, 8000);

        updateLoading(10);

        // Three.js Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 100, 500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 20);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        updateLoading(30);

        // Cannon.js Physics World
        const world = new CANNON.World();
        world.gravity.set(0, -15, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
        sunLight.position.set(80, 120, 40);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.left = -100;
        sunLight.shadow.camera.right = 100;
        sunLight.shadow.camera.top = 100;
        sunLight.shadow.camera.bottom = -100;
        scene.add(sunLight);

        updateLoading(50);

        // Create Ground
        const groundGeometry = new THREE.PlaneGeometry(400, 400, 40, 40);
        const vertices = groundGeometry.attributes.position.array;
        
        for (let i = 0; i < vertices.length; i += 3) {
            const x = vertices[i];
            const y = vertices[i + 1];
            vertices[i + 2] = Math.sin(x * 0.03) * Math.cos(y * 0.05) * 3;
        }
        groundGeometry.computeVertexNormals();

        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x5a7a3a,
            roughness: 0.85
        });
        
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Physics ground
        const groundPhysics = new CANNON.Body({
            mass: 0,
            shape: new CANNON.Plane()
        });
        groundPhysics.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundPhysics);

        updateLoading(60);

        // Create Road
        const roadGeometry = new THREE.PlaneGeometry(15, 250);
        const roadMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x3a3a3a,
            roughness: 0.7
        });
        const road = new THREE.Mesh(roadGeometry, roadMaterial);
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.05;
        road.receiveShadow = true;
        scene.add(road);

        // Road markings
        for (let i = -120; i < 120; i += 12) {
            const lineGeometry = new THREE.PlaneGeometry(0.4, 5);
            const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const line = new THREE.Mesh(lineGeometry, lineMaterial);
            line.rotation.x = -Math.PI / 2;
            line.position.set(0, 0.06, i);
            scene.add(line);
        }

        // Create obstacles and ramps
        function createObjects() {
            // Ramp
            const rampGeo = new THREE.BoxGeometry(12, 1, 18);
            const rampMat = new THREE.MeshStandardMaterial({ color: 0xa0826d });
            const ramp = new THREE.Mesh(rampGeo, rampMat);
            ramp.position.set(0, 0, -40);
            ramp.rotation.x = 0.25;
            ramp.castShadow = true;
            ramp.receiveShadow = true;
            scene.add(ramp);

            // Barriers
            for (let i = 0; i < 8; i++) {
                const barrierGeo = new THREE.BoxGeometry(0.6, 1.2, 2);
                const barrierMat = new THREE.MeshStandardMaterial({ 
                    color: i % 2 === 0 ? 0xee3333 : 0xffffff 
                });
                const barrier = new THREE.Mesh(barrierGeo, barrierMat);
                barrier.position.set(-6 + (i % 4) * 4, 0.6, 50 + Math.floor(i / 4) * 8);
                barrier.castShadow = true;
                barrier.receiveShadow = true;
                scene.add(barrier);

                const barrierBody = new CANNON.Body({
                    mass: 80,
                    shape: new CANNON.Box(new CANNON.Vec3(0.3, 0.6, 1))
                });
                barrierBody.position.copy(barrier.position);
                world.addBody(barrierBody);
            }

            // Trees
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const radius = 90 + Math.random() * 20;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;

                // Trunk
                const trunkGeo = new THREE.CylinderGeometry(0.6, 0.8, 5, 8);
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3526 });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.set(x, 2.5, z);
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                scene.add(trunk);

                // Foliage
                const foliageGeo = new THREE.ConeGeometry(3.5, 7, 8);
                const foliageMat = new THREE.MeshStandardMaterial({ color: 0x2a4a1a });
                const foliage = new THREE.Mesh(foliageGeo, foliageMat);
                foliage.position.set(x, 7, z);
                foliage.castShadow = true;
                scene.add(foliage);
            }
        }

        createObjects();
        updateLoading(75);

        // Vehicle Class
        class Vehicle {
            constructor() {
                this.mesh = new THREE.Group();
                this.damage = 0;
                this.maxDamage = 100;
                
                // Physics body
                this.body = new CANNON.Body({
                    mass: 1500,
                    shape: new CANNON.Box(new CANNON.Vec3(1, 0.6, 2.2)),
                    position: new CANNON.Vec3(0, 5, 0)
                });
                this.body.linearDamping = 0.3;
                this.body.angularDamping = 0.5;
                world.addBody(this.body);
                
                this.createMesh();
                this.createWheels();
                scene.add(this.mesh);

                this.previousVelocity = new CANNON.Vec3();
            }

            createMesh() {
                // Car body
                const bodyGeo = new THREE.BoxGeometry(2.2, 1.2, 4.5);
                const bodyMat = new THREE.MeshStandardMaterial({ 
                    color: 0xff4500,
                    metalness: 0.7,
                    roughness: 0.3
                });
                this.bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
                this.bodyMesh.castShadow = true;
                this.mesh.add(this.bodyMesh);

                // Roof
                const roofGeo = new THREE.BoxGeometry(2, 0.8, 2.5);
                const roofMat = new THREE.MeshStandardMaterial({ 
                    color: 0x2a2a2a,
                    metalness: 0.6,
                    roughness: 0.4
                });
                const roof = new THREE.Mesh(roofGeo, roofMat);
                roof.position.y = 1;
                roof.position.z = -0.4;
                roof.castShadow = true;
                this.mesh.add(roof);

                // Windshield
                const windshieldGeo = new THREE.BoxGeometry(1.9, 0.7, 1.2);
                const windshieldMat = new THREE.MeshStandardMaterial({ 
                    color: 0x88ccff,
                    metalness: 0.9,
                    roughness: 0.1,
                    transparent: true,
                    opacity: 0.4
                });
                const windshield = new THREE.Mesh(windshieldGeo, windshieldMat);
                windshield.position.set(0, 1, 0.8);
                this.mesh.add(windshield);

                // Hood
                const hoodGeo = new THREE.BoxGeometry(1.8, 0.4, 2);
                const hoodMat = new THREE.MeshStandardMaterial({ 
                    color: 0xff5722,
                    metalness: 0.8,
                    roughness: 0.2
                });
                const hood = new THREE.Mesh(hoodGeo, hoodMat);
                hood.position.set(0, 0.8, 1.8);
                hood.castShadow = true;
                this.mesh.add(hood);
            }

            createWheels() {
                this.wheels = [];
                this.wheelBodies = [];
                
                const positions = [
                    { x: -1.2, z: 1.5 },
                    { x: 1.2, z: 1.5 },
                    { x: -1.2, z: -1.5 },
                    { x: 1.2, z: -1.5 }
                ];

                positions.forEach(pos => {
                    // Visual
                    const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.35, 20);
                    const wheelMat = new THREE.MeshStandardMaterial({ 
                        color: 0x0a0a0a,
                        roughness: 0.9
                    });
                    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.castShadow = true;
                    this.wheels.push(wheel);
                    this.mesh.add(wheel);

                    // Physics (spheres for simplicity)
                    const wheelBody = new CANNON.Body({
                        mass: 40,
                        shape: new CANNON.Sphere(0.45),
                        position: new CANNON.Vec3(pos.x, 4, pos.z)
                    });
                    wheelBody.linearDamping = 0.4;
                    world.addBody(wheelBody);
                    this.wheelBodies.push(wheelBody);

                    // Constraint
                    const constraint = new CANNON.PointToPointConstraint(
                        this.body,
                        new CANNON.Vec3(pos.x, -0.6, pos.z),
                        wheelBody,
                        new CANNON.Vec3(0, 0, 0)
                    );
                    world.addConstraint(constraint);
                });
            }

            update() {
                // Sync mesh with physics
                this.mesh.position.copy(this.body.position);
                this.mesh.quaternion.copy(this.body.quaternion);

                // Update wheels
                this.wheels.forEach((wheel, i) => {
                    const wb = this.wheelBodies[i];
                    wheel.position.set(
                        wb.position.x - this.body.position.x,
                        wb.position.y - this.body.position.y,
                        wb.position.z - this.body.position.z
                    );
                    wheel.quaternion.copy(wb.quaternion);
                });

                // Damage calculation
                const velocityChange = this.body.velocity.vsub(this.previousVelocity).length();
                if (velocityChange > 5) {
                    this.damage += velocityChange * 0.5;
                    this.damage = Math.min(this.damage, this.maxDamage);
                }
                this.previousVelocity.copy(this.body.velocity);

                // Update damage bar
                const integrity = Math.max(0, 100 - (this.damage / this.maxDamage) * 100);
                damageBar.style.width = integrity + '%';
                
                if (this.damage > 60) {
                    this.bodyMesh.material.color.setHex(0x8b4513);
                }

                // Update speedometer
                const speed = this.body.velocity.length();
                speedEl.textContent = Math.round(speed * 3.6);
            }

            applyForces(forward, backward, left, right, brake) {
                const carRotation = new THREE.Euler().setFromQuaternion(this.body.quaternion);
                const forwardDir = new CANNON.Vec3(
                    Math.sin(carRotation.y),
                    0,
                    Math.cos(carRotation.y)
                );

                // Engine force
                if (forward) {
                    const force = forwardDir.scale(3500);
                    this.body.applyForce(force, this.body.position);
                }
                if (backward) {
                    const force = forwardDir.scale(-2000);
                    this.body.applyForce(force, this.body.position);
                }

                // Steering torque
                if (left) {
                    this.body.angularVelocity.y += 0.05;
                }
                if (right) {
                    this.body.angularVelocity.y -= 0.05;
                }

                // Handbrake
                if (brake) {
                    this.body.velocity.scale(0.95, this.body.velocity);
                }
            }

            reset() {
                this.body.position.set(0, 5, 0);
                this.body.velocity.set(0, 0, 0);
                this.body.angularVelocity.set(0, 0, 0);
                this.body.quaternion.setFromEuler(0, 0, 0);

                this.wheelBodies.forEach((wb, i) => {
                    const pos = [
                        { x: -1.2, z: 1.5 },
                        { x: 1.2, z: 1.5 },
                        { x: -1.2, z: -1.5 },
                        { x: 1.2, z: -1.5 }
                    ][i];
                    wb.position.set(pos.x, 4, pos.z);
                    wb.velocity.set(0, 0, 0);
                    wb.angularVelocity.set(0, 0, 0);
                });

                this.damage = 0;
                this.previousVelocity.set(0, 0, 0);
                damageBar.style.width = '100%';
                this.bodyMesh.material.color.setHex(0xff4500);
            }
        }

        const vehicle = new Vehicle();
        updateLoading(90);

        // Add some props
        for (let i = 0; i < 6; i++) {
            const boxGeo = new THREE.BoxGeometry(2, 2, 2);
            const boxMat = new THREE.MeshStandardMaterial({ 
                color: Math.random() > 0.5 ? 0x8b6914 : 0x666666 
            });
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.set(
                (Math.random() - 0.5) * 30,
                1,
                -20 + i * 15
            );
            box.castShadow = true;
            box.receiveShadow = true;
            scene.add(box);

            const boxBody = new CANNON.Body({
                mass: 100,
                shape: new CANNON.Box(new CANNON.Vec3(1, 1, 1))
            });
            boxBody.position.copy(box.position);
            world.addBody(boxBody);
        }

        updateLoading(100);

        // Input
        const keys = { 
            up: false, 
            down: false, 
            left: false, 
            right: false, 
            space: false 
        };

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = true;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space') {
                keys.space = true;
                e.preventDefault();
            }
            if (e.code === 'KeyC') {
                cameraMode = (cameraMode + 1) % 3;
                cameraModeEl.textContent = cameraModes[cameraMode];
            }
            if (e.code === 'KeyR') vehicle.reset();
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'Space') keys.space = false;
        });

        // Buttons
        document.getElementById('resetBtn').addEventListener('click', () => vehicle.reset());
        document.getElementById('cameraBtn').addEventListener('click', () => {
            cameraMode = (cameraMode + 1) % 3;
            cameraModeEl.textContent = cameraModes[cameraMode];
        });
        document.getElementById('crashBtn').addEventListener('click', () => {
            vehicle.body.velocity.set(0, 15, 40);
            vehicle.body.angularVelocity.set(3, 2, 1);
        });

        // Touch controls
        for (const btn of document.querySelectorAll('.touch button')) {
            const key = btn.getAttribute('data-key');
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[key] = true;
            }, { passive: false });
            btn.addEventListener('touchend', () => {
                keys[key] = false;
            });
            btn.addEventListener('mousedown', () => keys[key] = true);
            btn.addEventListener('mouseup', () => keys[key] = false);
        }

        // Camera modes
        let cameraMode = 0;
        const cameraModes = ['Follow', 'Chase', 'Top View'];

        function updateCamera() {
            const carPos = vehicle.body.position;
            const carQuat = vehicle.body.quaternion;
            const euler = new THREE.Euler().setFromQuaternion(
                new THREE.Quaternion(carQuat.x, carQuat.y, carQuat.z, carQuat.w)
            );

            if (cameraMode === 0) {
                // Follow camera
                const dist = 15;
                const height = 7;
                const targetX = carPos.x - Math.sin(euler.y) * dist;
                const targetZ = carPos.z - Math.cos(euler.y) * dist;
                
                camera.position.x += (targetX - camera.position.x) * 0.08;
                camera.position.y += (carPos.y + height - camera.position.y) * 0.08;
                camera.position.z += (targetZ - camera.position.z) * 0.08;
                
                camera.lookAt(carPos.x, carPos.y + 1, carPos.z);
            } else if (cameraMode === 1) {
                // Chase (closer)
                const dist = 10;
                const height = 4;
                const targetX = carPos.x - Math.sin(euler.y) * dist;
                const targetZ = carPos.z - Math.cos(euler.y) * dist;
                
                camera.position.x += (targetX - camera.position.x) * 0.12;
                camera.position.y += (carPos.y + height - camera.position.y) * 0.12;
                camera.position.z += (targetZ - camera.position.z) * 0.12;
                
                camera.lookAt(carPos.x, carPos.y, carPos.z);
            } else {
                // Top view
                camera.position.x += (carPos.x - camera.position.x) * 0.1;
                camera.position.y = 50;
                camera.position.z += (carPos.z - camera.position.z) * 0.1;
                camera.lookAt(carPos.x, 0, carPos.z);
            }
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Game loop
        let lastTime = performance.now();
        let frameCount = 0;
        let fpsTimer = 0;
        const fixedTimeStep = 1 / 60;

        function animate(time) {
            requestAnimationFrame(animate);

            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            // Update physics
            world.step(fixedTimeStep, dt, 3);

            // Apply controls
            vehicle.applyForces(keys.up, keys.down, keys.left, keys.right, keys.space);
            vehicle.update();

            // Update camera
            updateCamera();

            // Render
            renderer.render(scene, camera);

            // FPS counter
            frameCount++;
            fpsTimer += dt;
            if (fpsTimer >= 1) {
                fpsEl.textContent = frameCount;
                frameCount = 0;
                fpsTimer = 0;
            }
        }

        // Start game
        console.log('Game initialized');
        animate(performance.now());
    </script>
</body>
</html>
